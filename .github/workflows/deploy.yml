name: CI — build check

# El dashboard se opera en privado (local). Este workflow solo valida que compile.
# Si algún día se hace público o se mueve a Netlify, se puede reactivar el deploy.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
